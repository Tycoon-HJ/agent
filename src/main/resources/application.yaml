spring:
  application:
    name: Agent

  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com
      chat:
        model: deepseek-v4-pro

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  tomcat:
    max-http-form-post-size: 20MB

# Agent 配置
agent:
  skills:
    # Skill 文件目录（相对于项目根目录，或绝对路径）
    # 目录中的 .md 文件会被自动加载为 Skill
    directory: ./skills
